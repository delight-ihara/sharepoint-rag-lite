<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SharePoint RAG Lite — Pattern B</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --surface-2: #f1f3f5;
  --surface-hover: #e9ecef;
  --border: #e9ecef;
  --border-focus: #339af0;
  --text: #212529;
  --text-secondary: #495057;
  --text-muted: #868e96;
  --accent: #339af0;
  --accent-dark: #1c7ed6;
  --accent-glow: rgba(51,154,240,0.08);
  --user-bg: #e7f5ff;
  --user-border: #a5d8ff;
  --ai-surface: #ffffff;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 6px rgba(0,0,0,0.06);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  padding: 0 20px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
  box-shadow: var(--shadow-sm);
}

.header-logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #339af0, #1c7ed6);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 16px;
  color: #fff;
}

.header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-badge {
  font-size: 11px;
  color: var(--accent-dark);
  background: var(--accent-glow);
  border: 1px solid rgba(51,154,240,0.15);
  padding: 3px 10px;
  border-radius: 6px;
  font-weight: 500;
}

.btn-icon {
  width: 34px; height: 34px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  display: grid; place-items: center;
  transition: all 0.15s;
}

.btn-icon:hover {
  background: var(--surface-hover);
  color: var(--text);
}

/* ── Sidebar-like left strip ── */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}

.sidebar-section {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 12px 4px;
}

.sidebar-item {
  font-size: 13px;
  color: var(--text-secondary);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-item:hover { background: var(--surface-2); color: var(--text); }
.sidebar-item.active { background: var(--accent-glow); color: var(--accent-dark); font-weight: 500; }
.sidebar-item .icon { font-size: 15px; flex-shrink: 0; }

.sidebar-spacer { flex: 1; }

.sidebar-footer {
  font-size: 11px;
  color: var(--text-muted);
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  scroll-behavior: smooth;
  background: var(--bg);
}

.messages::-webkit-scrollbar { width: 5px; }
.messages::-webkit-scrollbar-thumb { background: #dee2e6; border-radius: 3px; }

.msg {
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  gap: 14px;
  animation: msgIn 0.3s ease;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.msg-user .msg-avatar {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
}

.msg-ai .msg-avatar {
  background: linear-gradient(135deg, #339af0, #1c7ed6);
  color: #fff;
}

.msg-body { flex: 1; min-width: 0; }

.msg-content {
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--text);
}

.msg-user .msg-content {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
  padding: 12px 16px;
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  display: inline-block;
}

.msg-ai .msg-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
}

.msg-ai .msg-content p { margin-bottom: 8px; }
.msg-ai .msg-content p:last-child { margin-bottom: 0; }
.msg-ai .msg-content ul { padding-left: 20px; margin: 8px 0; }
.msg-ai .msg-content li { margin-bottom: 4px; line-height: 1.7; }
.msg-ai .msg-content strong { font-weight: 600; }

.msg-ai .msg-content .ref {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px; height: 18px;
  background: var(--accent-glow);
  border: 1px solid rgba(51,154,240,0.2);
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  vertical-align: middle;
  cursor: pointer;
}

/* Citations */
.citations {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.citation {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent-dark);
  background: var(--accent-glow);
  border: 1px solid rgba(51,154,240,0.12);
  padding: 6px 12px;
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.15s;
  max-width: 260px;
}

.citation:hover {
  background: rgba(51,154,240,0.12);
  border-color: rgba(51,154,240,0.25);
}

.citation-num {
  width: 18px; height: 18px;
  background: var(--accent);
  color: #fff;
  border-radius: 5px;
  display: grid; place-items: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
}

.citation-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Actions */
.msg-actions {
  display: flex;
  gap: 2px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.15s;
}

.msg:hover .msg-actions { opacity: 1; }

.msg-action-btn {
  width: 28px; height: 28px;
  background: none;
  border: 1px solid transparent;
  border-radius: 7px;
  color: var(--text-muted);
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 13px;
  transition: all 0.12s;
}

.msg-action-btn:hover {
  background: var(--surface-2);
  border-color: var(--border);
  color: var(--text-secondary);
}

.msg-action-btn.active { color: var(--accent); }

/* ── Welcome ── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px 24px;
  text-align: center;
}

.welcome-logo {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #339af0, #1c7ed6);
  border-radius: 18px;
  display: grid; place-items: center;
  font-size: 28px;
  color: #fff;
  box-shadow: 0 8px 24px rgba(51,154,240,0.2);
}

.welcome h2 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.welcome p {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 400px;
  line-height: 1.7;
}

.suggestions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  width: 100%;
  max-width: 520px;
}

.suggestion {
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 14px 16px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.12s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-sm);
}

.suggestion:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(51,154,240,0.08);
  transform: translateY(-1px);
}

/* ── Input ── */
.input-area {
  padding: 12px 20px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-wrap {
  max-width: 720px;
  margin: 0 auto;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: flex-end;
  padding: 6px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap:focus-within {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(51,154,240,0.1);
}

.input-box {
  flex: 1;
  background: transparent;
  border: none;
  padding: 10px 14px;
  color: var(--text);
  font-size: 14.5px;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  outline: none;
  min-height: 24px;
  max-height: 140px;
}

.input-box::placeholder { color: var(--text-muted); }

.send-btn {
  width: 36px; height: 36px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  display: grid; place-items: center;
  transition: all 0.12s;
  margin: 0 2px 2px 0;
}

.send-btn:hover { background: var(--accent-dark); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; }

.input-footer {
  max-width: 720px;
  margin: 6px auto 0;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}

/* Loading */
.loading-dots { display: inline-flex; gap: 5px; padding: 8px 0; }
.loading-dots span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.16s; }
.loading-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* Cursor */
.cursor {
  display: inline-block;
  width: 2px; height: 16px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s ease infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">&#9889;</div>
  <div class="header-title">SharePoint RAG</div>
  <div class="header-right">
    <div class="header-badge">Lite v1</div>
    <button class="btn-icon" title="New chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">Today</div>
    <div class="sidebar-item active"><span class="icon">&#128172;</span> New chat</div>
    <div class="sidebar-section">Yesterday</div>
    <div class="sidebar-item"><span class="icon">&#128172;</span> 就業規則について</div>
    <div class="sidebar-item"><span class="icon">&#128172;</span> 情報セキュリティ方針</div>
    <div class="sidebar-item"><span class="icon">&#128172;</span> 育児休業の取得方法</div>
    <div class="sidebar-section">Last 7 days</div>
    <div class="sidebar-item"><span class="icon">&#128172;</span> 補助金規定</div>
    <div class="sidebar-item"><span class="icon">&#128172;</span> 出張規程の確認</div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-footer">Powered by Azure OpenAI</div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-logo">&#128269;</div>
        <h2>社内文書に何でも聞いてください</h2>
        <p>SharePoint 上の文書から AI が根拠付きで回答します。</p>
        <div class="suggestions">
          <div class="suggestion" onclick="ask('情報セキュリティの基本方針は？')">&#128196; 情報セキュリティの基本方針は？</div>
          <div class="suggestion" onclick="ask('就業規則のポイントを教えて')">&#128188; 就業規則のポイントを教えて</div>
          <div class="suggestion" onclick="ask('補助金に関する規定は？')">&#128176; 補助金に関する規定は？</div>
          <div class="suggestion" onclick="ask('育児休業の取得方法は？')">&#128100; 育児休業の取得方法は？</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="input-box" id="input" placeholder="質問を入力..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,140)+'px'"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="input-footer">Entra ID 認証済み &middot; AI 生成の回答です</div>
    </div>
  </div>
</div>

<script>
// Minimal JS for demo — same logic as Pattern A
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
let welcomeEl = document.getElementById('welcome');

function ask(text) { inputEl.value = text; send(); }

function renderMarkdown(text) {
  let html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\[(\d+)\]/g, '<span class="ref">$1</span>');
  html = html.split('\n\n').map(b => {
    b = b.trim(); if (!b) return '';
    const lines = b.split('\n');
    if (lines.every(l => /^\s*[-]/.test(l)))
      return '<ul>' + lines.map(l => '<li>' + l.replace(/^\s*[-]\s*/,'') + '</li>').join('') + '</ul>';
    return '<p>' + b.replace(/\n/g,'<br>') + '</p>';
  }).join('');
  return html;
}

function addMsg(role, content, citations) {
  if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
  const msg = document.createElement('div');
  msg.className = `msg msg-${role}`;
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.innerHTML = role === 'user' ? '&#128100;' : '&#9889;';
  const body = document.createElement('div');
  body.className = 'msg-body';
  const c = document.createElement('div');
  c.className = 'msg-content';
  c.innerHTML = role === 'ai' ? renderMarkdown(content) : '';
  if (role === 'user') c.textContent = content;
  body.appendChild(c);
  if (citations && citations.length) {
    const cit = document.createElement('div'); cit.className = 'citations';
    citations.forEach(ci => {
      const a = document.createElement('a'); a.className = 'citation';
      if (ci.source_url) a.href = ci.source_url;
      a.target = '_blank';
      const n = document.createElement('span'); n.className = 'citation-num'; n.textContent = ci.index;
      const t = document.createElement('span'); t.className = 'citation-title'; t.textContent = ci.title;
      a.append(n, t); cit.appendChild(a);
    });
    body.appendChild(cit);
  }
  if (role === 'ai') {
    const acts = document.createElement('div'); acts.className = 'msg-actions';
    ['&#128077;','&#128078;'].forEach(e => {
      const b = document.createElement('button'); b.className = 'msg-action-btn'; b.innerHTML = e;
      b.onclick = () => b.classList.toggle('active');
      acts.appendChild(b);
    });
    body.appendChild(acts);
  }
  msg.append(av, body);
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  addMsg('user', text);
  // Demo: simulate response
  addMsg('ai', 'ご質問を受け付けました。実際の環境では SSE ストリーミングで回答が表示されます。');
}

inputEl.focus();
</script>
</body>
</html>
